document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n      <a href=\"#solucao\" class=\"btn btn-ghost\">Ver como funciona<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"microcopy\">\n      <span><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> Acesso imediato<\u002Fspan>\n      <span><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> 30 dias de garantia<\u002Fspan>\n      <span><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> API Oficial WhatsApp<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- PAINEL REAL -->\n    <div class=\"painel-real\">\n      <img src=\"d76baa67-003e-4f7d-b6c4-045daa1b48b6\" alt=\"Painel CHAMA 360 - central de atendimento unificada\">\n      <div class=\"painel-caption\">Painel CHAMA 360 · central de atendimento ao vivo<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"trust-strip\">\n      <span>+10 anos em gestão &amp; tecnologia<\u002Fspan>\n      <span style=\"opacity:.4;\">·<\u002Fspan>\n      <span>API Oficial Meta<\u002Fspan>\n      <span style=\"opacity:.4;\">·<\u002Fspan>\n      <span>Suporte dedicado BR<\u002Fspan>\n      <span style=\"opacity:.4;\">·<\u002Fspan>\n      <span>LGPD Compliant<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OPENING -->\n<section class=\"opener container-narrow\">\n  <span class=\"section-label\">A realidade<\u002Fspan>\n  <h2>Você construiu um negócio do zero. E todo dia, no improviso, perde um pedaço dele.<\u002Fh2>\n  <div class=\"opener-copy\" style=\"margin-top: 40px;\">\n    <p>Você atende no WhatsApp, no Instagram, às vezes no Messenger. Tem um time tentando dar conta — cada um no próprio celular, respondendo do próprio jeito, sem supervisão, sem histórico.<\u002Fp>\n    <p>E no fim do mês, você olha para os números e sente que <strong>podia ter vendido mais<\u002Fstrong>. Que algum cliente sumiu no meio do caminho. Que uma venda boa foi perdida porque alguém demorou demais pra responder — ou simplesmente esqueceu.<\u002Fp>\n    <p>A <strong>CHAMA 360<\u002Fstrong> resolve isso. Uma plataforma completa de atendimento por conversas que conecta todos os seus canais em um único painel, organiza sua equipe, automatiza com IA e protege seu número pela API Oficial do WhatsApp — <strong>sem risco de bloqueio da META<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PAIN -->\n<section class=\"pain\">\n  <div class=\"container-narrow\">\n    <span class=\"section-label\">O que você reconhece?<\u002Fspan>\n    <h2>Se você atende pelo WhatsApp, você sabe <em>exatamente<\u002Fem> como isso funciona na prática.<\u002Fh2>\n\n    <div class=\"pain-list\">\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">01<\u002Fdiv>\n        <div class=\"pain-text\">Você já perdeu uma venda porque o lead esperou demais e foi para o concorrente — e <strong>nem sabia que ele estava esperando<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">02<\u002Fdiv>\n        <div class=\"pain-text\">Já teve aquela sensação horrível de receber a notificação: <strong>\"Sua conta foi banida\"<\u002Fstrong> — e não saber o que fazer.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">03<\u002Fdiv>\n        <div class=\"pain-text\">Já tentou supervisionar o atendimento da sua equipe e percebeu que é <strong>impossível quando cada operador usa o próprio celular<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">04<\u002Fdiv>\n        <div class=\"pain-text\">Já se perguntou: <strong>\"quem falou com esse cliente? O que foi combinado? Onde está o histórico?\"<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">05<\u002Fdiv>\n        <div class=\"pain-text\">Já pagou por uma plataforma cara, recebeu suporte ruim e ficou preso num contrato que <strong>não entregou metade do que prometeu<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">06<\u002Fdiv>\n        <div class=\"pain-text\">Sentiu que sua base existe — mas ninguém está reativando, ninguém está nutrindo, e <strong>o dinheiro que deveria voltar simplesmente some<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pain-close\">\n      Você não tem um problema de vendas. Você tem um problema de <em>organização e controle<\u002Fem> do atendimento — e isso custa caro todo dia.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOLUTION -->\n<section class=\"solution\" id=\"solucao\">\n  <div class=\"container\">\n    <div class=\"solution-grid\">\n      <div class=\"solution-visual\">\n        <div class=\"orbit\">\n          <div class=\"orbit-ring r1\"><\u002Fdiv>\n          <div class=\"orbit-ring r2\"><\u002Fdiv>\n          <div class=\"orbit-center\">\n            <svg viewBox=\"0 0 32 32\" fill=\"none\"><path d=\"M16 3 C 18 10, 25 11, 24 19 C 23 26, 18 28, 16 28 C 14 28, 9 26, 8 19 C 7 11, 14 10, 16 3 Z\" fill=\"#FFFFFF\"><\u002Fpath><path d=\"M16 11 C 17 15, 20 15.5, 19.5 20 C 19 24, 17 25, 16 25 C 15 25, 13 24, 12.5 20 C 12 15.5, 15 15, 16 11 Z\" fill=\"#D94E1F\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"orbit-node n1\" title=\"WhatsApp\">\n            <svg viewBox=\"0 0 24 24\" fill=\"#25D366\"><path d=\"M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.4-2.3-1.4-.8-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.1-.7-1.7-.9-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4 0 1.4 ><strong>Retenção e reativação da base<\u002Fstrong><span>Sequências e campanhas trazem de volta quem já comprou.<\u002Fspan><\u002Fdiv>\n          <\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BENEFITS -->\n<section class=\"benefits\" id=\"beneficios\">\n  <div class=\"container\">\n    <span class=\"section-label\">Os benefícios<\u002Fspan>\n    <div class=\"benefits-head\">\n      <h2>Tudo o que sua operação precisa — <em>num único lugar<\u002Fem>.<\u002Fh2>\n      <p>Sete mudanças práticas que você sente no primeiro mês. Não são promessas vagas — são as rotinas que deixam de ser um problema.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"benefits-grid\">\n      <div class=\"benefit\">\n        <div class=\"benefit-num\">01<\u002Fdiv>\n        <div class=\"benefit-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Nunca mais perca uma conversa<\u002Fh4>\n        <p>Todas as mensagens do WhatsApp, Instagram e Messenger chegam num único painel organizado por equipe, fila e prioridade.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"benefit\">\n        <div class=\"benefit-num\">02<\u002Fdiv>\n        <div class=\"benefit-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Sua operação roda mesmo quando você dorme<\u002Fh4>\n        <p>Agentes de IA atendem, qualificam e encaminham os leads automaticamente, 24 horas por dia, 7 dias por semana.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"benefit\">\n        <div class=\"benefit-num\">03<\u002Fdiv>\n        <div class=\"benefit-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 22s8-4   <\u002Fdiv>\n      <div class=\"objection\">\n        <div class=\"q\">\"Já usei outras plataformas e me decepcionei.\"<\u002Fdiv>\n        <p class=\"a\">Sabemos que o mercado está cheio de promessa vazia. Por isso a CHAMA oferece <strong>30 dias de garantia, sem burocracia<\u002Fstrong>. Se você testar e não sentir a diferença na organização do seu atendimento, devolvemos seu investimento. Simples assim.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- GUARANTEE -->\n<section class=\"guarantee\">\n  <div class=\"container-narrow guarantee-inner\">\n    <div class=\"guarantee-seal\">\n      <div>\n        <span class=\"big\">30<\u002Fspan>\n        <span class=\"sm\">dias de garantia total<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <h3>O risco é <em>nosso<\u002Fem>.<\u002Fh3>\n      <p>Você tem 30 dias para testar a CHAMA 360 com a sua equipe, com seus clientes reais. Se não sentir a diferença, <strong>devolvemos 100%<\u002Fstrong> do que você pagou. Sem formulário complicado. Sem letras miúdas. Sem questionamento. Você só fica se quiser.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"faq\" id=\"faq\">\n  <div class=\"container\">\n    <div class=\"faq-grid\">\n      <div>\n        <span class=\"section-label\">FAQ<\u002Fspan>\n        <h2 style=\"font-size: clamp(32px, 3.6vw, 48px); margin-top: 8px;\">Perguntas que a gente <em>ouve toda semana<\u002Fem>.<\u002Fh2>\n        <p style=\"color: var(--ink-mute); font-size: 15px; margin-top: 24px;\">Se ainda ficou alguma dúvida, nosso time está disponível no chat ou por WhatsApp.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"faq-list\">\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">Preciso de experiência técnica para configurar?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Não. A CHAMA foi desenvolvida para o gestor comum que usa o WhatsApp no dia a dia. A configuração inicial é simples e o suporte dedicado te acompanha em cada etapa do setup.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">Serve para empresa pequena ou só grande operação?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Serve para os dois. Planos a partir de R$ 339,90/mês para quem está começando, e planos completos com até 10 usuários e 20 chatbots para operações maiores. Você começa no seu ritmo e cresce na plataforma.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">Meu número pode ser bloqueado usando a CHAMA?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Não. Operamos exclusivamente pela API Oficial do WhatsApp, homologada pela META. Você fica protegido dentro das políticas oficiais — sem risco de bloqueio.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">E se eu não gostar? Como funciona a garantia?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Você tem 30 dias corridos a partir da ativação. Se quiser cancelar dentro desse prazo, devolvemos 100% do seu investimento. Sem perguntas.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">Posso conectar Instagram e Messenger também?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Sim, nos planos Chama e Fogo. Você centraliza WhatsApp, Instagram e Messenger em um único painel de atendimento.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">Tem integração com ferramentas que já uso?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Sim. A CHAMA tem integração via Webhook e API, além de componentes nativos para Make.com e N8N. Se você já tem automações rodando, a CHAMA se encaixa no seu fluxo.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">Como funciona o suporte?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Você tem suporte dedicado disponível para tirar dúvidas sobre uso e configuração da plataforma. Não está sozinho.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"faq-item\">\n          <button class=\"faq-q\">Posso adicionar usuários e canais depois?<span class=\"faq-toggle\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <div class=\"faq-a\"><p>Sim. Você pode contratar usuários adicionais, canais de WhatsApp, Instagram e Messenger a qualquer momento, conforme sua operação cresce.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA -->\n<section class=\"final-cta\">\n  <div class=\"container-narrow final-cta-inner\">\n    <span class=\"eyebrow\" style=\"margin-bottom: 24px;\"><span class=\"dot\"><\u002Fspan> Sua próxima semana começa aqui<\u002Fspan>\n    <h2>Você pode continuar no improviso. <em>Ou acender a CHAMA.<\u002Fem><\u002Fh2>\n    <p>Cada dia sem controle do seu atendimento é dinheiro saindo pela porta dos fundos. Comece agora — 30 dias de risco zero.<\u002Fp>\n    <div class=\"cta-row\">\n      <a href=\"#planos\" class=\"btn btn-primary\">\n        Quero ativar minha CHAMA 360\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n    <div class=\"microcopy\" style=\"justify-content: center;\">\n      <span><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> Acesso imediato<\u002Fspan>\n      <span><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> Suporte dedicado<\u002Fspan>\n      <span><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> 30 dias de garantia<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"ps\">\n      <span class=\"sig\">P.S. — da equipe CHAMA<\u002Fspan>\n      Se você chegou até aqui, é porque reconheceu pelo menos um dos problemas que descrevemos. E você sabe que deixar assim não é opção. <strong>Cada dia sem controle do seu atendimento é dinheiro saindo pela porta dos fundos<\u002Fstrong> — cliente que não foi respondido, venda que ficou no ar, base que não foi reativada. Com 30 dias de garantia, você não tem nada a perder — só a ganhar.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"container foot\">\n    <div class=\"logo\" style=\"color: var(--paper);\">\n      <img src=\"15ab50f6-bd3f-44bb-a20b-506815f8d403\" alt=\"CHAMA 360\" style=\"height: 32px; width: auto; display: block; border-radius: 4px;\">\n    <\u002Fdiv>\n    <div class=\"foot-links\">\n      <a href=\"#\">Termos<\u002Fa>\n      <a href=\"#\">Privacidade<\u002Fa>\n      <a href=\"#\">LGPD<\u002Fa>\n      <a href=\"#\">Contato<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;\">© 2026 CHAMA 360<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"container\" style=\"margin-top: 28px; padding-top: 24px; border-top: 1px solid rgba(250,247,242,0.08); display: flex; flex-wrap: wrap; gap: 14px 28px; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(250,247,242,0.4);\">\n    <div>ORL360VISAO LTDA&nbsp;&nbsp;·&nbsp;&nbsp;CNPJ 60.747.377/0001-30<\u002Fdiv>\n    <div>© Todos os direitos reservados<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS PANEL -->\n<div class=\"tweaks\" id=\"tweaks-panel\">\n  <h5>Tweaks <span style=\"font-weight: 400; font-family: var(--sans); text-transform: none; letter-spacing: 0; font-size: 11px; opacity: .6;\">Ajuste o design ao vivo<\u002Fspan><\u002Fh5>\n\n  <div class=\"tweaks-row\">\n    <label>Headline (ângulo)<\u002Flabel>\n    <div class=\"tweaks-options\" data-tweak=\"headline\">\n      <button class=\"tweak-opt\" data-val=\"A\">A · Dor<\u002Fbutton>\n      <button class=\"tweak-opt active\" data-val=\"B\">B · Resultado<\u002Fbutton>\n      <button class=\"tweak-opt\" data-val=\"C\">C · Bloqueio<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweaks-row\">\n    <label>Cor de acento<\u002Flabel>\n    <div class=\"tweak-swatches\" data-tweak=\"accent\">\n      <div class=\"tweak-swatch active\" data-val=\"orange\" style=\"background: linear-gradient(135deg, #FFB84D, #D94E1F);\"><\u002Fdiv>\n      <div class=\"tweak-swatch\" data-val=\"crimson\" style=\"background: linear-gradient(135deg, #F97070, #C12B2B);\"><\u002Fdiv>\n      <div class=\"tweak-swatch\" data-val=\"amber\" style=\"background: linear-gradient(135deg, #FFD056, #E89900);\"><\u002Fdiv>\n      <div class=\"tweak-swatch\" data-val=\"electric\" style=\"background: linear-gradient(135deg, #FF7A5C, #8B2BE2);\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweaks-row\">\n    <label>Destaque de pricing<\u002Flabel>\n    <div class=\"tweaks-options\" data-tweak=\"featured\">\n      <button class=\"tweak-opt\" data-val=\"brasa\">Brasa<\u002Fbutton>\n      <button class=\"tweak-opt active\" data-val=\"chama\">Chama<\u002Fbutton>\n      <button class=\"tweak-opt\" data-val=\"fogo\">Fogo<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweaks-row\">\n    <label>Intensidade do fundo<\u002Flabel>\n    <div class=\"tweaks-options\" data-tweak=\"intensity\">\n      <button class=\"tweak-opt\" data-val=\"calm\">Sóbrio<\u002Fbutton>\n      <button class=\"tweak-opt active\" data-val=\"balanced\">Balanceado<\u002Fbutton>\n      <button class=\"tweak-opt\" data-val=\"inferno\">Inferno<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"headline\": \"A\",\n    \"accent\": \"orange\",\n    \"featured\": \"chama\",\n    \"intensity\": \"balanced\"\n  }/*EDITMODE-END*/;\n\n  const STATE = { ...TWEAK_DEFAULTS };\n\n  // ---- FAQ accordion ----\n  document.querySelectorAll('.faq-item .faq-q').forEach(btn => {\n    btn.addEventListener('click', () => {\n      btn.parentElement.classList.toggle('open');\n    });\n  });\n  // open first\n  const firstFaq = document.querySelector('.faq-item');\n  if (firstFaq) firstFaq.classList.add('open');\n\n  // ---- Fade in on scroll ----\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });\n  }, { threshold: 0.05 });\n  document.querySelectorAll('section').forEach(s => {\n    s.classList.add('fadein');\n    const r = s.getBoundingClientRect();\n    if (r.top < window.innerHeight && r.bottom > 0) {\n      s.classList.add('in');\n    } else {\n      io.observe(s);\n    }\n  });\n\n  // ---- Tweaks ----\n  const headlines = {\n    A: {\n      title: 'Você está perdendo clientes todo dia por falta de <em>organização<\u002Fem> no atendimento — e provavelmente nem percebeu.',\n      sub: 'Seus concorrentes estão respondendo primeiro. Suas vendas estão indo embora em silêncio. A CHAMA 360 acende a luz no seu atendimento — e você finalmente vê o que está acontecendo.'\n    },\n    B: {\n      title: 'Centralize todo o seu atendimento, automatize com <em>IA<\u002Fem> e pare de perder vendas para a bagunça do WhatsApp.',\n      sub: 'A plataforma profissional de atendimento e CRM que centraliza WhatsApp, Instagram e Messenger em um só lugar — com chatbot, IA e gestão completa da sua equipe, sem complicação e sem risco de bloqueio.'\n    },\n    C: {\n      title: 'Cansado de plataforma cara, suporte ruim e medo do número ser <em>bloqueado pela META<\u002Fem>?',\n      sub: 'A CHAMA 360 opera 100% pela API Oficial do WhatsApp. Sem gambiarra, sem risco. Com IA, CRM e tudo o que sua operação precisa pra crescer dentro das regras.'\n    }\n  };\n\n  const accents = {\n    orange:  { flame:'oklch(0.68 0.19 45)',  deep:'oklch(0.52 0.22 32)', bright:'oklch(0.78 0.17 60)', ember:'oklch(0.42 0.19 28)' },\n    crimson: { flame:'oklch(0.62 0.22 20)',  deep:'oklch(0.48 0.24 15)', bright:'oklch(0.72 0.20 25)', ember:'oklch(0.40 0.20 12)' },\n    amber:   { flame:'oklch(0.78 0.17 80)',  deep:'oklch(0.62 0.19 70)', bright:'oklch(0.86 0.15 90)', ember:'oklch(0.52 0.17 60)' },\n    electric:{ flame:'oklch(0.65 0.22 20)',  deep:'oklch(0.48 0.22 310)', bright:'oklch(0.75 0.18 30)',ember:'oklch(0.40 0.22 295)' }\n  };\n\n  const intensities = {\n    calm:     { a: '0.25', b: '0.2', c: '0.15' },\n    balanced: { a: '0.55', b: '0.5', c: '0.35' },\n    inferno:  { a: '0.85', b: '0.75', c: '0.6' }\n  };\n\n  function applyTweaks() {\n    // headline\n    const h = headlines[STATE.headline];\n    document.getElementById('hero-headline').innerHTML = h.title;\n    document.getElementById('hero-sub').textContent = h.sub;\n\n    // accent\n    const a = accents[STATE.accent];\n    const root = document.documentElement.style;\n    root.setProperty('--flame', a.flame);\n    root.setProperty('--flame-deep', a.deep);\n    root.setProperty('--flame-bright', a.bright);\n    root.setProperty('--ember', a.ember);\n\n    // featured plan\n    document.querySelectorAll('.plan').forEach((p, i) => {\n      p.classList.remove('featured');\n      const badge = p.querySelector('.plan-badge');\n      if (badge) badge.remove();\n    });\n    const planMap = { brasa: 1, chama: 2, fogo: 3 };\n    const featIdx = planMap[STATE.featured];\n    const planEl = document.querySelectorAll('.plan')[featIdx];\n    if (planEl) {\n      planEl.classList.add('featured');\n      const b = document.createElement('div');\n      b.className = 'plan-badge';\n      b.textContent = '⭐ Mais escolhido';\n      planEl.prepend(b);\n    }\n\n    // intensity\n    const int = intensities[STATE.intensity];\n    document.querySelectorAll('.hero-flame, .final-cta::before').forEach(el => {});\n    const flameEls = document.querySelectorAll('.hero-flame');\n    flameEls.forEach(el => {\n      el.style.background = `\n        radial-gradient(ellipse 60% 50% at 80% 20%, oklch(0.55 0.22 35 / ${int.a}), transparent 60%),\n        radial-gradient(ellipse 70% 60% at 10% 90%, oklch(0.45 0.20 28 / ${int.b}), transparent 60%),\n        radial-gradient(ellipse 40% 40% at 50% 110%, oklch(0.72 0.18 55 / ${int.c}), transparent 60%)\n      `;\n    });\n\n    // update tweak buttons\n    document.querySelectorAll('.tweaks-options').forEach(group => {\n      const key = group.dataset.tweak;\n      group.querySelectorAll('.tweak-opt').forEach(b => {\n        b.classList.toggle('active', b.dataset.val === STATE[key]);\n      });\n    });\n    document.querySelectorAll('.tweak-swatches').forEach(group => {\n      const key = group.dataset.tweak;\n      group.querySelectorAll('.tweak-swatch').forEach(b => {\n        b.classList.toggle('active', b.dataset.val === STATE[key]);\n      });\n    });\n  }\n\n  // Wire tweaks panel\n  function wireTweaks() {\n    document.querySelectorAll('[data-tweak]').forEach(group => {\n      const key = group.dataset.tweak;\n      group.querySelectorAll('[data-val]').forEach(btn => {\n        btn.addEventListener('click', () => {\n          STATE[key] = btn.dataset.val;\n          applyTweaks();\n          try {\n            const edit = { [key]: btn.dataset.val };\n            window.parent.postMessage({ type: '__edit_mode_set_keys', edits: edit }, '*');\n          } catch (e) {}\n        });\n      });\n    });\n  }\n\n  // Edit mode protocol\n  window.addEventListener('message', (e) => {\n    const d = e.data;\n    if (!d || !d.type) return;\n    if (d.type === '__activate_edit_mode') {\n      document.getElementById('tweaks-panel').classList.add('on');\n    } else if (d.type === '__deactivate_edit_mode') {\n      document.getElementById('tweaks-panel').classList.remove('on');\n    }\n  });\n  wireTweaks();\n  applyTweaks();\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
